# Rocky Linux (aarch64) Lima 템플릿
# 기본값은 Taskfile vars / limactl --set 으로 덮어쓸 수 있음
#
# 예:
#   task up
#   task up VM=lab IMAGE=~/virt/lima/rocky-lima.qcow2 CPUS=4 MEMORY=8GiB

vmType: "vz"
arch: "aarch64"

# 중첩 가상화 (Apple silicon M3+ / macOS 15+ / vz 전용)
nestedVirtualization: true

images:
  # 로컬 커스텀 이미지 (기본 경로). Taskfile IMAGE 로 덮어쓰기 가능
  - location: "~/virt/lima/rocky-lima.qcow2"
    arch: "aarch64"

cpus: 2
memory: "14GiB"
disk: "50GiB"

# 호스트에서 직접 도달 가능한 IP (전 포트 접근). 설치·sudo 불필요, vz 전용
networks:
  - vzNAT: true

# 게스트 사용자
user:
  name: "dev"

# Linux guest는 password 기본 잠금 → provision으로 설정
# 스크립트는 외부 파일(provision/system.py)로 분리 — 생성 시점에 embed 됨
provision:
  - mode: system
    path: provision/system.py
