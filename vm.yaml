# Rocky Linux (aarch64) Lima 템플릿
# 기본값은 Taskfile vars / limactl --set 으로 덮어쓸 수 있음
#
# 예:
#   task up
#   task up VM=lab IMAGE=~/virt/lima/rocky-lima.qcow2 CPUS=4 MEMORY=8GiB

vmType: "vz"
arch: "aarch64"

# 중첩 가상화 (Apple silicon M3+ / macOS 15+ / vz 전용)
nestedVirtualization: true

images:
  # 로컬 커스텀 이미지 (기본 경로). Taskfile IMAGE 로 덮어쓰기 가능
  - location: "~/virt/lima/rocky-lima.qcow2"
    arch: "aarch64"

cpus: 2
memory: "14GiB"
disk: "50GiB"

# 호스트에서 직접 도달 가능한 IP (전 포트 접근). 설치·sudo 불필요, vz 전용
networks:
  - vzNAT: true

# 게스트 사용자
user:
  name: "dev"

# mDNS/호스트명 파라미터 (Taskfile HOSTNAME 또는 limactl --set='.param.HOSTNAME=...' 로 덮어쓰기)
# 최종 접속 이름은 <HOSTNAME>.local (avahi 광고)
param:
  HOSTNAME: "rocky"

# Linux guest는 password 기본 잠금 → provision으로 설정
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      echo 'dev:dev' | chpasswd
      # SSH 비밀번호 인증 허용 (클라우드 이미지 기본값 no)
      #  - sshd는 '첫 값 우선'이라 50-cloud-init.conf(no)가 이김 → 그 파일을 직접 yes로
      if [ -f /etc/ssh/sshd_config.d/50-cloud-init.conf ]; then
        sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config.d/50-cloud-init.conf
      fi
      install -d -m755 /etc/ssh/sshd_config.d
      printf 'PasswordAuthentication yes\n' > /etc/ssh/sshd_config.d/99-password-auth.conf
      systemctl restart sshd || systemctl restart ssh || true
      # Lima 기본 hostname은 lima-<name> → mDNS 이름용으로 param.HOSTNAME 으로 변경
      # 결과: <HOSTNAME>.local 로 도달 가능 (예: rocky.local)
      hostnamectl set-hostname "{{.Param.HOSTNAME}}"
      dnf install -y avahi avahi-tools
      systemctl enable --now avahi-daemon
